<h2 mat-dialog-title>{{ data.serviceName }}</h2>

<mat-dialog-content>
  <p class="view-password__label">Username</p>
  <p class="view-password__value">{{ data.username }}</p>

  <p class="view-password__label">Password</p>
  <div class="view-password__secret-row">
    <p class="view-password__value view-password__value--secret" aria-live="polite">
      @if (passwordVisible()) {
        {{ data.password }}
      } @else {
        {{ maskedPassword() }}
      }
    </p>
    <button
      mat-icon-button
      type="button"
      class="view-password__toggle"
      [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="passwordVisible()"
      (click)="togglePasswordVisibility()"
    >
      <mat-icon>{{ passwordVisible() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="copyPassword()">
    <mat-icon>content_copy</mat-icon>
    {{ copied() ? 'Copied' : 'Copy password' }}
  </button>
  <button mat-flat-button color="primary" type="button" (click)="close()">Close</button>
</mat-dialog-actions>
