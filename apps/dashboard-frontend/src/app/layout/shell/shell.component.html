<mat-sidenav-container class="guardme-shell">
  <mat-sidenav mode="side" opened class="guardme-sidenav">
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-nav-item"
          [routerLinkActiveOptions]="navLinkActiveOptions"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="guardme-toolbar">
      <span class="guardme-brand">
        <mat-icon>shield</mat-icon>
        GuardMe
      </span>
      <span class="spacer"></span>
      @if (username(); as name) {
        @if (reAuthStale()) {
          <button
            mat-stroked-button
            type="button"
            class="reauth-chip"
            (click)="openReAuthDialog()"
            aria-label="Re-authentication required. Confirm your password."
          >
            <mat-icon>lock_clock</mat-icon>
            Re-auth needed
          </button>
        }
        <span class="user-label">{{ name }}</span>
        <app-notification-bell />
        <button
        mat-icon-button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [matTooltip]="themeMode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-label]="
          themeMode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
        "
        >
          <mat-icon>{{ themeMode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <button mat-button type="button" (click)="logout()">Sign out</button>
      }
    </mat-toolbar>

    <main class="guardme-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
